<!-- public/index.html -->
<!doctype html>
<html lang="ja">
  <body>
    <div id="log"></div>
    <input id="msg" placeholder="メッセージを入力" />
    <button id="send">送信</button>

    <script>
      const sendButton = document.getElementById("send");
      const input = document.getElementById("msg");
      const log = document.getElementById("log");

      // 会話全体を入れておく1本の配列。最初に system（設定）を1個だけ入れる
      const history = [
        { role: "system", content: "あなたは親切で、やさしい日本語で答えるアシスタントです。" },
      ];

      // 履歴を画面に描き直す（system は裏方なので表示しない・textContentで安全に）
      function render() {
        log.textContent = "";
        for (const m of history) {
          if (m.role === "system") continue;
          const line = document.createElement("p");
          line.textContent = (m.role === "user" ? "あなた: " : "AI: ") + m.content;
          log.appendChild(line);
        }
      }

      async function send(text) {
        history.push({ role: "user", content: text }); // ①送る前にuserを足す
        render();
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: history }), // ②全履歴を送る
        });
        const data = await res.json();
        history.push({ role: "assistant", content: data.reply }); // ③返事をassistantとして足す
        render();
      }

      sendButton.addEventListener("click", () => {
        const text = input.value;
        input.value = "";
        send(text);
      });
    </script>
  </body>
</html>
